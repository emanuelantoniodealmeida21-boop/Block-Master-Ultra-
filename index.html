<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Block Master Ultra</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      text-align: center;
      font-family: Arial;
    }
    h1 { margin-top: 20px; }
    #grid {
      display: grid;
      grid-template-columns: repeat(8, 40px);
      gap: 5px;
      justify-content: center;
      margin-top: 20px;
    }
    .block {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
    }
    button {
      margin-top: 20px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: gold;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>🔥 Block Master Ultra</h1>
<p id="score">Score: 0</p>

<div id="grid"></div>

<button onclick="resetGame()">Reiniciar</button>

<script>
const ROWS = 8;
const COLS = 8;
const COLORS = ["red","blue","green","yellow","purple","pink"];

let board = [];
let score = 0;

function randomColor(){
  return COLORS[Math.floor(Math.random()*COLORS.length)];
}

function createBoard(){
  board = [];
  for(let r=0;r<ROWS;r++){
    let row = [];
    for(let c=0;c<COLS;c++){
      row.push(randomColor());
    }
    board.push(row);
  }
}

function drawBoard(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  board.forEach((row,r)=>{
    row.forEach((color,c)=>{
      const div = document.createElement("div");
      div.className = "block";
      div.style.background = color;
      div.onclick = ()=>handleClick(r,c);
      grid.appendChild(div);
    });
  });

  document.getElementById("score").innerText = "Score: " + score;
}

function getGroup(r,c,color,visited={}){
  const key = r+"-"+c;
  if(r<0||c<0||r>=ROWS||c>=COLS||board[r][c]!==color||visited[key]) return [];

  visited[key]=true;

  return [
    [r,c],
    ...getGroup(r+1,c,color,visited),
    ...getGroup(r-1,c,color,visited),
    ...getGroup(r,c+1,color,visited),
    ...getGroup(r,c-1,color,visited)
  ];
}

function handleClick(r,c){
  const group = getGroup(r,c,board[r][c]);
  if(group.length < 2) return;

  group.forEach(([r,c])=> board[r][c]=null);

  applyGravity();
  refill();

  score += group.length * 10;
  drawBoard();
}

function applyGravity(){
  for(let c=0;c<COLS;c++){
    let stack = [];
    for(let r=ROWS-1;r>=0;r--){
      if(board[r][c]) stack.push(board[r][c]);
    }
    for(let r=ROWS-1;r>=0;r--){
      board[r][c] = stack.shift() || null;
    }
  }
}

function refill(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(!board[r][c]) board[r][c] = randomColor();
    }
  }
}

function resetGame(){
  score = 0;
  createBoard();
  drawBoard();
}

// iniciar
createBoard();
drawBoard();
</script>

</body>
</html>
